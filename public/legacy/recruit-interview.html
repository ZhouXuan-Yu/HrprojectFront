<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>面试计划 · 智能招聘系统</title><link rel="stylesheet" href="css/style.css">
<style>
  .scope-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;background:var(--c-bg);color:var(--c-body);border:1px solid transparent;transition:all .15s}
  .scope-tag.active{background:var(--c-primary-subtle);color:var(--c-primary);border-color:var(--c-primary);font-weight:600}
  .alert-btn{position:relative}
  .alert-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--c-reject);color:#fff;font-size:10px;line-height:16px;text-align:center;font-weight:700}
  .status-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .status-chip{padding:4px 14px;border-radius:20px;font-size:12px;cursor:pointer;background:var(--c-bg);color:var(--c-body);border:1px solid transparent;transition:all .15s}
  .status-chip.active{background:var(--c-primary-subtle);color:var(--c-primary);border-color:var(--c-primary);font-weight:600}
  .status-chip .cnt{font-weight:700}
</style></head><body>
<aside class="sidebar" id="sidebar"></aside>
<main class="content">
  <header class="topbar">
    <h1>面试计划</h1>
    <div class="breadcrumb"><a href="recruit-dashboard.html">招聘管理</a> / 面试计划</div>
    <div class="spacer"></div>
    <div style="position:relative">
      <button class="btn btn-ghost btn-sm alert-btn" onclick="toggleAlerts()" id="alertBtn" style="gap:4px">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--c-warn);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        提醒
        <span class="alert-badge">4</span>
      </button>
      <div id="alertDropdown" style="display:none;position:absolute;top:100%;right:0;margin-top:6px;width:380px;background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-modal);z-index:100;font-size:13px;line-height:2">
        <div style="font-weight:700;margin-bottom:10px;color:var(--c-text);font-size:14px">智能提醒</div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0"><span><span class="alert-dot reject"></span> 孙九 · 复试超3天未评价</span><button class="btn btn-primary btn-sm" onclick="alert('填写对孙九的评价')">去评价</button></div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0"><span><span class="alert-dot reject"></span> 陈二 · 初试超5天未评价</span><button class="btn btn-primary btn-sm" onclick="alert('填写对陈二的评价')">去评价</button></div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0"><span><span class="alert-dot warn"></span> 张三 · 07-16 14:00 初试</span><button class="btn btn-outline btn-sm" onclick="document.getElementById('alertDropdown').style.display='none'">查看</button></div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0"><span><span class="alert-dot warn"></span> 李四 · 07-17 10:00 初试</span><button class="btn btn-outline btn-sm" onclick="document.getElementById('alertDropdown').style.display='none'">查看</button></div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0"><span><span class="alert-dot done"></span> 郑一 · 已通过，待发Offer</span><button class="btn btn-success btn-sm" onclick="alert('发起Offer')">发Offer</button></div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0"><span><span class="alert-dot done"></span> 王工 · 内部面试已通过</span><button class="btn btn-outline btn-sm" onclick="alert('发起调岗')">发起调岗</button></div>
      </div>
    </div>
    <select id="scopeSelect" onchange="onScopeChange()" style="height:30px;padding:0 10px;border:1px solid var(--c-border);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;background:var(--c-card);color:var(--c-body)">
      <option value="all">全部面试</option>
      <option value="created">我发起的</option>
    </select>
    <button class="btn btn-primary btn-sm role-hr-admin" onclick="openGlobalScheduleModal('','','')" style="margin-left:8px">+ 新建面试</button>
    <button class="btn btn-outline btn-sm" onclick="openCalendarView()" style="margin-left:4px" title="查看本周面试日程">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> 日程</button>
  </header>
  <div class="content-body">

    <!-- KPI 行 -->
    <div class="metric-row" style="margin-bottom:var(--gap)">
      <div class="metric-card"><div class="metric-icon"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="metric-value" id="kpiPending">4</div><div class="metric-label">待安排</div></div></div>
      <div class="metric-card"><div class="metric-icon"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div class="metric-value" id="kpiScheduled">8</div><div class="metric-label">待面试</div></div></div>
      <div class="metric-card"><div class="metric-icon"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div><div><div class="metric-value" id="kpiEval">3</div><div class="metric-label">待评价</div></div></div>
      <div class="metric-card"><div class="metric-icon"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="metric-value" id="kpiOffer">1</div><div class="metric-label">待录用</div></div></div>
      <div class="metric-card"><div class="metric-icon"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div><div><div class="metric-value" id="kpiOnboard">1</div><div class="metric-label">待入职</div></div></div>
      <div class="metric-card"><div class="metric-icon"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M20 6L9 17l-5-5"/></svg></div><div><div class="metric-value" id="kpiDone">1</div><div class="metric-label">已入职</div></div></div>
    </div>

    <!-- Tab -->
    <div class="tabs" id="interviewTabs">
      <div class="tab active" data-tab="list">全部面试</div>
      <div class="tab" data-tab="mine">我的待办</div>
    </div>

    <!-- 全部面试 -->
    <div class="tab-panel active" id="panel-list">
      <div class="status-chips">
        <span class="status-chip active" data-status="all">全部 <span class="cnt">17</span></span>
        <span class="status-chip" data-status="pending">待安排 <span class="cnt">4</span></span>
        <span class="status-chip" data-status="scheduled">待面试 <span class="cnt">8</span></span>
        <span class="status-chip" data-status="evaluating">待评价 <span class="cnt">3</span></span>
        <span class="status-chip" data-status="offer">待录用 <span class="cnt">1</span></span>
        <span class="status-chip" data-status="onboard">待入职 <span class="cnt">0</span></span>
        <span class="status-chip" data-status="done">已入职 <span class="cnt">1</span></span>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>候选人</th><th>岗位</th><th>轮次</th><th>面试官</th><th>时间</th><th>方式</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="listBody"></tbody></table>
        <div class="table-count" id="listCount"></div>
      </div>
    </div>

    <!-- 我的待办 -->
    <div class="tab-panel" id="panel-mine">
      <div class="status-chips">
        <span class="status-chip active" data-status="all">全部 <span class="cnt">0</span></span>
        <span class="status-chip" data-status="pending">待安排 <span class="cnt">0</span></span>
        <span class="status-chip" data-status="scheduled">待面试 <span class="cnt">0</span></span>
        <span class="status-chip" data-status="evaluating">待评价 <span class="cnt">0</span></span>
        <span class="status-chip" data-status="offer">待录用 <span class="cnt">0</span></span>
        <span class="status-chip" data-status="onboard">待入职 <span class="cnt">0</span></span>
        <span class="status-chip" data-status="done">已入职 <span class="cnt">0</span></span>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>候选人</th><th>岗位</th><th>轮次</th><th>时间</th><th>方式</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="mineBody"></tbody></table>
        <div class="table-count" id="mineCount"></div>
      </div>
    </div>

  </div>
</main>
<script src="js/app.js"></script>
<script>
renderSidebar('recruit-interview');

var ALL_INTERVIEWS = [
  {name:'王五', position:'数据分析师', round:'初试(1轮)', interviewer:'张HR', date:'待定', time:'待定', method:'待定', status:'pending', statusLabel:'待安排', createdBy:'张HR', isMine:true},
  {name:'吴六', position:'高级Java工程师', round:'初试(1轮)', interviewer:'待分配', date:'待定', time:'待定', method:'待定', status:'pending', statusLabel:'待安排', createdBy:'张HR', isMine:true},
  {name:'赵十', position:'高级Java工程师', round:'初试(1轮)', interviewer:'待分配', date:'待定', time:'待定', method:'待定', status:'pending', statusLabel:'待安排', createdBy:'刘博', isMine:false},
  {name:'钱七', position:'产品经理', round:'初试(1轮)', interviewer:'待分配', date:'待定', time:'待定', method:'待定', status:'pending', statusLabel:'待安排', createdBy:'张HR', isMine:true},
  {name:'张三', position:'高级Java工程师', round:'初试(1/3轮)', interviewer:'李面试官', date:'07-16', time:'14:00', method:'飞书视频', status:'scheduled', statusLabel:'待面试', createdBy:'张HR', isMine:false},
  {name:'李四', position:'前端工程师', round:'初试(1/2轮)', interviewer:'王面试官', date:'07-17', time:'10:00', method:'飞书视频', status:'scheduled', statusLabel:'待面试', createdBy:'张HR', isMine:false},
  {name:'张三', position:'高级Java工程师', round:'复试(2/3轮)', interviewer:'李面试官', date:'07-22', time:'10:00', method:'现场', status:'scheduled', statusLabel:'待面试', createdBy:'张HR', isMine:false},
  {name:'王五', position:'数据分析师', round:'初试(2轮)', interviewer:'张HR', date:'07-18', time:'11:00', method:'电话', status:'scheduled', statusLabel:'待面试', createdBy:'张HR', isMine:true},
  {name:'钱工', position:'高级Java工程师', round:'内部面试', interviewer:'张HR', date:'07-19', time:'14:00', method:'现场', status:'scheduled', statusLabel:'待面试', createdBy:'张HR', isMine:true},
  {name:'王工', position:'高级Java工程师', round:'内部面试', interviewer:'刘博', date:'07-20', time:'09:00', method:'飞书视频', status:'scheduled', statusLabel:'待面试', createdBy:'刘博', isMine:false},
  {name:'李四', position:'前端工程师', round:'复试(2/2轮)', interviewer:'王面试官', date:'07-25', time:'15:00', method:'飞书视频', status:'scheduled', statusLabel:'待面试', createdBy:'张HR', isMine:false},
  {name:'周明', position:'高级Java工程师', round:'初试(1/3轮)', interviewer:'李面试官', date:'07-21', time:'13:00', method:'现场', status:'scheduled', statusLabel:'待面试', createdBy:'刘博', isMine:false},
  {name:'孙九', position:'高级Java工程师', round:'复试(2/3轮)', interviewer:'张HR', date:'07-13', time:'10:00', method:'现场', status:'evaluating', statusLabel:'待评价', createdBy:'张HR', isMine:true},
  {name:'陈二', position:'产品经理', round:'初试(2/2轮)', interviewer:'张HR', date:'07-14', time:'09:00', method:'电话', status:'evaluating', statusLabel:'待评价', createdBy:'张HR', isMine:true},
  {name:'吴六', position:'运营总监', round:'初试(1/3轮)', interviewer:'刘博', date:'07-12', time:'11:00', method:'飞书视频', status:'evaluating', statusLabel:'待评价', createdBy:'刘博', isMine:false},
  {name:'郑一', position:'前端工程师', round:'终面(2/2轮)', interviewer:'王面试官', date:'07-12', time:'15:00', method:'现场', status:'offer', statusLabel:'待录用', createdBy:'王面试官', isMine:false},
  {name:'王五', position:'数据分析师', round:'Offer确认', interviewer:'张HR', date:'07-26', time:'09:30', method:'飞书消息', status:'onboard', statusLabel:'待入职', createdBy:'张HR', isMine:true},
  {name:'周工', position:'产品经理', round:'初试(1/2轮)', interviewer:'张HR', date:'07-05', time:'10:00', method:'现场', status:'done', statusLabel:'已入职', createdBy:'张HR', isMine:true},
  {name:'陈二', position:'产品经理', round:'初试(1/2轮)', interviewer:'张HR', date:'07-10', time:'09:00', method:'电话', status:'done', statusLabel:'已入职', createdBy:'张HR', isMine:true, result:'reject'}
];

var currentScope = 'all';
var listStatus = 'all';
var mineStatus = 'all';

function renderRow(item, viewType){
  var clsMap = {pending:'st st-draft', scheduled:'st st-progress', evaluating:'st st-warn', offer:'st st-done', onboard:'st st-done', done:'st st-done'};
  var statusCls = clsMap[item.status]||'st st-draft';
  var actionCell = '';
  if(item.status==='pending'){
    actionCell = '<button class="btn btn-outline btn-sm" onclick="openCandidateDrawer(mockCandidate(\''+item.name+'\'))">简历</button> <button class="btn btn-primary btn-sm" onclick="openGlobalScheduleModal(\''+item.name+'\',\''+item.position+'\',\'技术部\')">发起面试</button>';
  } else if(item.status==='scheduled'){
    actionCell = '<button class="btn btn-outline btn-sm" onclick="openCandidateDrawer(mockCandidate(\''+item.name+'\'))">简历</button> <button class="btn btn-text-danger btn-sm">取消</button>';
  } else if(item.status==='evaluating'){
    actionCell = '<button class="btn btn-outline btn-sm" onclick="openCandidateDrawer(mockCandidate(\''+item.name+'\'))">简历</button> <button class="btn btn-primary btn-sm" onclick="alert(\'【面试评价】\n填写对'+item.name+'的评价\n[通过→待录用] [不通过→回流]\')">填评价</button>';
  } else if(item.status==='offer'){
    actionCell = '<button class="btn btn-outline btn-sm" onclick="openCandidateDrawer(mockCandidate(\''+item.name+'\'))">简历</button> <button class="btn btn-outline btn-sm" onclick="alert(\'审批进度：\n✓ 部门负责人 已通过\n✓ HR 已通过\n○ 财务总监 待审批\')">审批中</button> <button class="btn btn-success btn-sm" onclick="alert(\'发送Offer给'+item.name+'\')">发Offer</button>';
  } else if(item.status==='onboard'){
    actionCell = '<button class="btn btn-outline btn-sm" onclick="openCandidateDrawer(mockCandidate(\''+item.name+'\'))">简历</button> <span style="font-size:11px;color:var(--c-sub)">待入职 · 08-01</span>';
  } else {
    actionCell = '<button class="btn btn-outline btn-sm" onclick="openCandidateDrawer(mockCandidate(\''+item.name+'\'))">简历</button> <span style="font-size:11px;color:var(--c-sub)">'+(item.result==='reject'?'已回流人才库':'已入职')+'</span>';
  }
  if(viewType==='mine'){
    return '<tr><td><a href="javascript:void(0)" onclick="openCandidateDrawer(mockCandidate(\''+item.name+'\'))" style="font-weight:600;color:var(--c-primary)">'+item.name+'</a></td><td>'+item.position+'</td><td>'+item.round+'</td><td>'+item.date+' '+item.time+'</td><td>'+item.method+'</td><td><span class="'+statusCls+'">'+item.statusLabel+'</span></td><td style="white-space:nowrap">'+actionCell+'</td></tr>';
  }
  return '<tr><td><a href="javascript:void(0)" onclick="openCandidateDrawer(mockCandidate(\''+item.name+'\'))" style="font-weight:600;color:var(--c-primary)">'+item.name+'</a></td><td>'+item.position+'</td><td>'+item.round+'</td><td>'+item.interviewer+'</td><td>'+item.date+' '+item.time+'</td><td>'+item.method+'</td><td><span class="'+statusCls+'">'+item.statusLabel+'</span></td><td style="white-space:nowrap">'+actionCell+'</td></tr>';
}

function countBy(st){ return st==='all' ? ALL_INTERVIEWS.length : ALL_INTERVIEWS.filter(function(item){return item.status===st;}).length; }
function countMineBy(st){ return st==='all' ? ALL_INTERVIEWS.filter(function(item){return item.isMine;}).length : ALL_INTERVIEWS.filter(function(item){return item.isMine && item.status===st;}).length; }

function renderTables(){
  var user = localStorage.getItem('hr_user')||'张HR';

  var listFiltered = ALL_INTERVIEWS.filter(function(item){
    if(currentScope==='created' && item.createdBy!==user) return false;
    if(listStatus!=='all' && item.status!==listStatus) return false;
    return true;
  });
  var lh='';
  for(var i=0; i<listFiltered.length; i++){ lh += renderRow(listFiltered[i],'list'); }
  document.getElementById('listBody').innerHTML = lh || '<tr><td colspan="8" style="text-align:center;color:var(--c-sub);padding:24px 0">暂无匹配记录</td></tr>';
  document.getElementById('listCount').textContent = '共 '+listFiltered.length+' 条';

  var mineFiltered = ALL_INTERVIEWS.filter(function(item){
    if(!item.isMine) return false;
    if(mineStatus!=='all' && item.status!==mineStatus) return false;
    return true;
  });
  var mh='';
  for(var i=0; i<mineFiltered.length; i++){ mh += renderRow(mineFiltered[i],'mine'); }
  document.getElementById('mineBody').innerHTML = mh || '<tr><td colspan="7" style="text-align:center;color:var(--c-sub);padding:24px 0">暂无待办</td></tr>';
  document.getElementById('mineCount').textContent = '共 '+mineFiltered.length+' 条';

  // 更新 status chip 计数
  var STATUSES = ['all','pending','scheduled','evaluating','offer','onboard','done'];
  STATUSES.forEach(function(st){
    var c1 = document.querySelector('#panel-list .status-chip[data-status="'+st+'"] .cnt');
    var c2 = document.querySelector('#panel-mine .status-chip[data-status="'+st+'"] .cnt');
    if(c1) c1.textContent = countBy(st);
    if(c2) c2.textContent = countMineBy(st);
  });

  // 更新 KPI
  document.getElementById('kpiPending').textContent = countBy('pending');
  document.getElementById('kpiScheduled').textContent = countBy('scheduled');
  document.getElementById('kpiEval').textContent = countBy('evaluating');
  document.getElementById('kpiOffer').textContent = countBy('offer');
  document.getElementById('kpiOnboard').textContent = countBy('onboard');
  document.getElementById('kpiDone').textContent = countBy('done');
}

function toggleAlerts(){
  var dd = document.getElementById('alertDropdown');
  dd.style.display = dd.style.display==='none'?'block':'none';
}
document.addEventListener('click',function(e){
  var dd = document.getElementById('alertDropdown');
  var btn = document.getElementById('alertBtn');
  if(dd && btn && dd.style.display==='block' && !btn.contains(e.target) && !dd.contains(e.target)){
    dd.style.display = 'none';
  }
});

// Tab 切换
document.getElementById('interviewTabs').addEventListener('click',function(e){
  if(!e.target.classList.contains('tab')) return;
  document.querySelectorAll('#interviewTabs .tab').forEach(function(t){t.classList.remove('active')});
  e.target.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('panel-'+e.target.dataset.tab).classList.add('active');
});

// 状态筛选
document.getElementById('panel-list').addEventListener('click',function(e){
  var chip = e.target.closest('.status-chip');
  if(!chip) return;
  document.querySelectorAll('#panel-list .status-chip').forEach(function(c){c.classList.remove('active')});
  chip.classList.add('active');
  listStatus = chip.dataset.status;
  renderTables();
});
document.getElementById('panel-mine').addEventListener('click',function(e){
  var chip = e.target.closest('.status-chip');
  if(!chip) return;
  document.querySelectorAll('#panel-mine .status-chip').forEach(function(c){c.classList.remove('active')});
  chip.classList.add('active');
  mineStatus = chip.dataset.status;
  renderTables();
});

// 范围筛选
function onScopeChange(){
  currentScope = document.getElementById('scopeSelect').value;
  renderTables();
}

// ===== 日历视图弹窗 =====
function openCalendarView(){
  var old = document.getElementById('calendarViewModal');
  if(old) old.remove();

  var now = new Date();
  var weekStart = new Date(now); weekStart.setDate(now.getDate()-((now.getDay()+6)%7));
  var days = ['一','二','三','四','五','六','日'];
  var CAL_DATA = {};
  ALL_INTERVIEWS.forEach(function(item){
    if(item.status==='scheduled'||item.status==='evaluating'||item.status==='onboard'||item.status==='done'){
      if(item.date!=='待定'){
        var k = '2026-'+item.date;
        if(!CAL_DATA[k]) CAL_DATA[k]=[];
        CAL_DATA[k].push(item);
      }
    }
  });

  // 本周日期
  var weekDays = [];
  for(var i=0; i<7; i++){
    var d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    var key = d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
    var hasInterview = CAL_DATA[key] ? CAL_DATA[key].length : 0;
    weekDays.push({key:key, date:d, day:days[i], count:hasInterview, today:key===dateKey2(now)});
  }

  function dateKey2(d){ return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate(); }

  // 重建本周数据
  weekDays = [];
  for(var i=0; i<7; i++){
    var d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    var key = d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
    var items = CAL_DATA[key]||[];
    weekDays.push({key:key, date:d, day:days[i], count:items.length, items:items, today:key===dateKey2(now)});
  }

  var overlay = document.createElement('div');
  overlay.id = 'calendarViewModal';
  overlay.className = 'modal-overlay';
  overlay.style.display = 'flex';
  overlay.onclick = function(e){ if(e.target===overlay) overlay.remove(); };

  var monthStr = (now.getMonth()+1)+'月';
  var weekLabel = monthStr+' 第'+(Math.ceil(weekStart.getDate()/7))+'周';

  var h = '<div class="modal-box" style="width:720px;max-height:85vh;overflow-y:auto">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  h += '<h3 style="margin:0">面试日程 · '+weekLabel+'</h3>';
  h += '<div style="display:flex;gap:6px"><button class="btn btn-outline btn-sm" onclick="alert(\'切换月份（demo）\')">本月</button><button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'calendarViewModal\').remove()">关闭</button></div>';
  h += '</div>';

  // 7天网格
  h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px">';
  weekDays.forEach(function(wd){
    var bg = wd.today ? 'var(--c-primary-subtle)' : 'var(--c-bg)';
    var border = wd.today ? '2px solid var(--c-primary)' : '1px solid var(--c-border)';
    var countBg = wd.count>0 ? 'var(--c-primary)' : 'var(--c-sub)';
    h += '<div style="text-align:center;padding:10px 4px;background:'+bg+';border:'+border+';border-radius:8px">';
    h += '<div style="font-size:11px;color:var(--c-sub)">周'+wd.day+'</div>';
    h += '<div style="font-size:20px;font-weight:700;color:var(--c-text)">'+(wd.date.getDate()<10?'0':'')+wd.date.getDate()+'</div>';
    if(wd.count>0){
      h += '<div style="margin-top:4px;display:inline-block;padding:1px 8px;border-radius:10px;background:'+countBg+';color:#fff;font-size:11px;font-weight:700">'+wd.count+'场</div>';
    } else {
      h += '<div style="margin-top:4px;font-size:11px;color:var(--c-sub)">—</div>';
    }
    h += '</div>';
  });
  h += '</div>';

  // 每天的面试列表
  weekDays.forEach(function(wd){
    if(wd.count===0) return;
    h += '<div style="margin-bottom:12px"><b style="font-size:13px">'+(wd.date.getMonth()+1)+'/'+(wd.date.getDate()<10?'0':'')+wd.date.getDate()+' 周'+wd.day+' · '+wd.count+'场</b>';
    h += '<table style="margin-top:4px;font-size:12px"><thead><tr><th>候选人</th><th>岗位</th><th>轮次</th><th>时间</th><th>方式</th><th>状态</th></tr></thead><tbody>';
    wd.items.forEach(function(item){
      var stCls = item.status==='scheduled'?'st st-progress':(item.status==='evaluating'?'st st-warn':'st st-done');
      h += '<tr><td><a href="javascript:void(0)" style="font-weight:600;color:var(--c-primary)">'+item.name+'</a></td><td>'+item.position+'</td><td>'+item.round+'</td><td>'+item.time+'</td><td>'+item.method+'</td><td><span class="'+stCls+'">'+item.statusLabel+'</span></td></tr>';
    });
    h += '</tbody></table></div>';
  });

  h += '<div class="modal-actions" style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'calendarViewModal\').remove()">关闭</button></div>';
  h += '</div>';
  overlay.innerHTML = h;
  document.body.appendChild(overlay);
}
</script></body></html>
