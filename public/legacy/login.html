<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 智能招聘系统</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<style>
.login-stage{
  --mx:50%;
  --my:50%;
  --pupil-x:0px;
  --pupil-y:0px;
  --tilt-x:0deg;
  --tilt-y:0deg;
  width:100%;
  min-height:100vh;
  display:grid;
  grid-template-columns:minmax(520px,1.05fr) minmax(420px,.95fr);
  overflow:hidden;
  background:#F6F8FB;
  color:#172033;
  font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
}
.brand-panel{
  position:relative;
  min-height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:48px clamp(32px,5vw,72px);
  background:
    radial-gradient(circle at var(--mx) var(--my), rgba(79,110,247,.28), transparent 0 18%, transparent 40%),
    linear-gradient(135deg,#5B6475 0%,#8C95A6 52%,#C9D2E3 100%);
  color:#FFFFFF;
}
.brand-panel::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
  background-size:28px 28px;
  background-position:
    calc((var(--mx) - 50%) * .04) calc((var(--my) - 50%) * .04);
  opacity:.75;
}
.brand-panel::after{
  content:"";
  position:absolute;
  width:520px;
  height:520px;
  right:-160px;
  bottom:-150px;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  filter:blur(20px);
}
.brand-top,.brand-copy,.brand-footer,.character-scene{
  position:relative;
  z-index:1;
}
.brand-top{
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:800;
  font-size:16px;
}
.brand-mark{
  width:36px;
  height:36px;
  border-radius:8px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(8px);
}
.brand-copy{
  max-width:620px;
}
.brand-copy h1{
  margin:0;
  font-size:clamp(42px,5.4vw,76px);
  line-height:1;
  letter-spacing:0;
  font-weight:900;
}
.brand-copy p{
  margin:22px 0 0;
  max-width:520px;
  color:rgba(255,255,255,.82);
  font-size:15px;
  line-height:1.9;
}
.character-scene{
  height:380px;
  width:min(620px,100%);
  margin:28px auto 0;
  transform:perspective(900px) rotateX(var(--tilt-x)) rotateY(var(--tilt-y));
  transition:transform .12s ease-out;
}
.character{
  position:absolute;
  bottom:0;
  border-radius:16px 16px 0 0;
  transition:height .45s ease,transform .45s ease,border-radius .45s ease;
  box-shadow:0 28px 80px rgba(23,32,51,.18);
}
.character.tall{
  left:80px;
  width:170px;
  height:330px;
  background:#4F6EF7;
  z-index:1;
}
.character.dark{
  left:245px;
  width:126px;
  height:260px;
  background:#1E293B;
  z-index:2;
}
.character.front{
  left:0;
  width:252px;
  height:172px;
  border-radius:126px 126px 0 0;
  background:#F3A475;
  z-index:4;
}
.character.gold{
  left:360px;
  width:150px;
  height:210px;
  border-radius:75px 75px 0 0;
  background:#E7D66B;
  z-index:3;
}
.face{
  position:absolute;
  display:flex;
  gap:24px;
  transition:left .28s ease,top .28s ease,transform .28s ease;
}
.character.tall .face{left:48px;top:42px}
.character.dark .face{left:28px;top:34px;gap:20px}
.character.front .face{left:88px;top:78px}
.character.gold .face{left:54px;top:46px;gap:18px}
.eye{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#FFFFFF;
  display:grid;
  place-items:center;
  overflow:hidden;
  transition:height .16s ease,transform .16s ease;
}
.character.dark .eye{width:16px;height:16px}
.character.front .eye,.character.gold .eye{
  width:13px;
  height:13px;
  background:#172033;
}
.pupil{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#172033;
  transform:translate(var(--pupil-x),var(--pupil-y));
  transition:transform .08s ease-out,opacity .12s ease;
}
.character.dark .pupil{width:6px;height:6px}
.character.front .pupil,.character.gold .pupil{
  width:12px;
  height:12px;
  background:#172033;
}
.mouth{
  position:absolute;
  left:48px;
  top:92px;
  width:54px;
  height:4px;
  border-radius:999px;
  background:#172033;
  transition:transform .24s ease,width .24s ease;
}
.login-stage.username-mode .character.tall{
  height:350px;
  transform:translateX(20px) skewX(-4deg);
}
.login-stage.username-mode .character.dark{
  transform:translateX(12px) skewX(4deg);
}
.login-stage.password-mode .character.tall{
  height:365px;
  transform:translateX(42px) skewX(-10deg);
}
.login-stage.password-mode .character.dark{
  transform:translateX(20px) skewX(8deg);
}
.login-stage.password-mode .eye{
  height:3px;
}
.login-stage.password-mode .pupil{
  opacity:0;
}
.login-stage.password-mode .character.front .face,
.login-stage.password-mode .character.gold .face{
  top:72px;
}
.login-stage.password-mode .mouth{
  width:38px;
  transform:translateX(10px) rotate(-4deg);
}
.brand-footer{
  display:flex;
  gap:24px;
  color:rgba(255,255,255,.7);
  font-size:12px;
}
.login-side{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:42px clamp(24px,5vw,72px);
  background:#FFFFFF;
}
.login-box{
  width:100%;
  max-width:430px;
}
.mobile-brand{
  display:none;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:34px;
  font-weight:800;
}
.login-box h2{
  margin:0;
  font-size:30px;
  line-height:1.2;
  letter-spacing:0;
  font-weight:900;
  color:#172033;
}
.login-box .sub{
  margin:8px 0 30px;
  color:#8C95A6;
  font-size:14px;
}
.role-label{
  display:block;
  margin-bottom:10px;
  color:#172033;
  font-size:13px;
  font-weight:700;
}
.roles{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin-bottom:22px;
}
.role-card{
  min-height:78px;
  border:1px solid #E1E6EF;
  border-radius:8px;
  background:#FFFFFF;
  color:#172033;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:5px;
  padding:10px 8px;
  transition:transform .16s ease,border-color .16s ease,background .16s ease,box-shadow .16s ease;
}
.role-card:hover{
  transform:translateY(-1px);
  border-color:#4F6EF7;
}
.role-card.sel{
  border-color:#4F6EF7;
  background:#F5F8FF;
  box-shadow:0 0 0 3px rgba(79,110,247,.1);
}
.role-card .icon{
  font-size:20px;
  font-weight:900;
}
.role-card .role-name{
  font-size:13px;
  font-weight:800;
}
.role-card .role-note{
  color:#8C95A6;
  font-size:11px;
  line-height:1.35;
}
.form-group{
  margin-bottom:17px;
}
.form-group label{
  display:block;
  margin-bottom:7px;
  color:#172033;
  font-size:13px;
  font-weight:700;
}
.form-group input{
  width:100%;
  height:48px;
  border:1px solid #E1E6EF;
  border-radius:999px;
  background:#FFFFFF;
  color:#172033;
  padding:0 16px;
  font-size:14px;
  outline:none;
  transition:border-color .16s ease,box-shadow .16s ease;
}
.form-group input::placeholder{color:#A7B0C1}
.form-group input:focus{
  border-color:#4F6EF7;
  box-shadow:0 0 0 3px rgba(79,110,247,.12);
}
.login-options{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin:2px 0 22px;
  color:#5B6475;
  font-size:13px;
}
.login-options label{
  display:flex;
  align-items:center;
  gap:8px;
}
.login-options input{
  width:15px;
  height:15px;
  accent-color:#4F6EF7;
}
.login-options a{
  color:#4F6EF7;
  text-decoration:none;
  font-weight:700;
}
.login-options a:hover{text-decoration:underline}
.btn-login{
  width:100%;
  height:48px;
  border:0;
  border-radius:999px;
  color:#FFFFFF;
  background:#4F6EF7;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  transition:transform .16s ease,background .16s ease,box-shadow .16s ease;
  box-shadow:0 14px 28px rgba(79,110,247,.22);
}
.btn-login:hover{
  transform:translateY(-1px);
  background:#3D54D4;
  box-shadow:0 18px 34px rgba(79,110,247,.28);
}
.login-foot{
  margin-top:16px;
  text-align:center;
  color:#8C95A6;
  font-size:12px;
}
@media(max-width:980px){
  .login-stage{
    grid-template-columns:1fr;
  }
  .brand-panel{
    display:none;
  }
  .login-side{
    padding:32px 20px;
  }
  .mobile-brand{
    display:flex;
  }
}
@media(max-width:520px){
  .roles{
    grid-template-columns:1fr;
  }
  .role-card{
    min-height:64px;
  }
  .login-options{
    align-items:flex-start;
    flex-direction:column;
  }
}
@media(prefers-reduced-motion:reduce){
  .brand-panel::before,.character-scene,.character,.face,.eye,.pupil,.role-card,.btn-login{
    transition:none!important;
    transform:none!important;
  }
}
</style>

<section class="login-stage" id="loginStage">
  <aside class="brand-panel" aria-hidden="true">
    <div class="brand-top">
      <div class="brand-mark">HR</div>
      <span>智能招聘系统</span>
    </div>

    <div class="brand-copy">
      <h1>欢迎回来</h1>
      <p>进入招聘看板、需求管理、人才库与面试计划。系统将根据演示角色展示对应菜单权限。</p>

      <div class="character-scene">
        <div class="character tall">
          <div class="face">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
          </div>
        </div>
        <div class="character dark">
          <div class="face">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
          </div>
        </div>
        <div class="character front">
          <div class="face">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
          </div>
        </div>
        <div class="character gold">
          <div class="face">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
          </div>
          <div class="mouth"></div>
        </div>
      </div>
    </div>

    <div class="brand-footer">
      <span>招聘管理</span>
      <span>人才库</span>
      <span>面试计划</span>
    </div>
  </aside>

  <main class="login-side">
    <div class="login-box">
      <div class="mobile-brand"><div class="brand-mark">HR</div><span>智能招聘系统</span></div>
      <h2>登录</h2>
      <div class="sub">选择演示角色后进入系统</div>

      <span class="role-label">演示角色</span>
      <div class="roles">
        <button type="button" class="role-card sel" data-role="admin" onclick="selRole(this)">
          <span class="icon">A</span>
          <span class="role-name">管理员</span>
          <span class="role-note">全部功能与系统配置</span>
        </button>
        <button type="button" class="role-card" data-role="hr" onclick="selRole(this)">
          <span class="icon">HR</span>
          <span class="role-name">HR 专员</span>
          <span class="role-note">招聘全流程操作</span>
        </button>
        <button type="button" class="role-card" data-role="interviewer" onclick="selRole(this)">
          <span class="icon">I</span>
          <span class="role-name">面试官</span>
          <span class="role-note">面试评价与查看</span>
        </button>
      </div>

      <div class="form-group"><label for="username">账号</label><input type="text" id="username" value="admin" placeholder="输入账号" autocomplete="username"></div>
      <div class="form-group"><label for="password">密码</label><input type="password" id="password" value="123456" placeholder="输入密码" autocomplete="current-password"></div>

      <div class="login-options">
        <label><input type="checkbox" id="remember"> 30 天内记住我</label>
        <a href="#" onclick="return false">忘记密码？</a>
      </div>

      <button class="btn-login" onclick="login()">登录</button>
      <div class="login-foot">原型演示，点击登录即可进入</div>
    </div>
  </main>
</section>

<script>
let selectedRole = 'admin';
function selRole(el){
  document.querySelectorAll('.role-card').forEach(function(card){ card.classList.remove('sel'); });
  el.classList.add('sel');
  selectedRole = el.dataset.role;
}
function login(){
  localStorage.setItem('hr_role', selectedRole);
  localStorage.setItem('hr_user', document.getElementById('username').value || '用户');
  location.href = 'recruit-dashboard.html';
}
(function(){
  var stage = document.getElementById('loginStage');
  var userInput = document.getElementById('username');
  var passInput = document.getElementById('password');
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!stage) return;

  function setMode(mode){
    stage.classList.remove('username-mode','password-mode');
    if(mode) stage.classList.add(mode + '-mode');
  }
  function track(event){
    var rect = stage.getBoundingClientRect();
    var x = ((event.clientX - rect.left) / rect.width) * 100;
    var y = ((event.clientY - rect.top) / rect.height) * 100;
    var pupilX = Math.max(-5, Math.min(5, (x - 50) / 8));
    var pupilY = Math.max(-4, Math.min(4, (y - 42) / 10));

    stage.style.setProperty('--mx', x.toFixed(2) + '%');
    stage.style.setProperty('--my', y.toFixed(2) + '%');
    stage.style.setProperty('--pupil-x', pupilX.toFixed(2) + 'px');
    stage.style.setProperty('--pupil-y', pupilY.toFixed(2) + 'px');
    stage.style.setProperty('--tilt-y', ((x - 50) / 42).toFixed(2) + 'deg');
    stage.style.setProperty('--tilt-x', ((50 - y) / 56).toFixed(2) + 'deg');
  }

  userInput.addEventListener('focus', function(){ setMode('username'); });
  userInput.addEventListener('blur', function(){ setMode(''); });
  passInput.addEventListener('focus', function(){ setMode('password'); });
  passInput.addEventListener('blur', function(){ setMode(''); });

  if(reduceMotion) return;
  stage.addEventListener('mousemove', track);
  stage.addEventListener('mouseleave', function(){
    stage.style.setProperty('--mx','50%');
    stage.style.setProperty('--my','50%');
    stage.style.setProperty('--pupil-x','0px');
    stage.style.setProperty('--pupil-y','0px');
    stage.style.setProperty('--tilt-x','0deg');
    stage.style.setProperty('--tilt-y','0deg');
  });
})();
</script>
</body>
</html>
