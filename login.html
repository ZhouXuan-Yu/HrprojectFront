<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 智能招聘系统</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1E293B}
.login-box{background:#fff;border-radius:12px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-box h1{font-size:20px;text-align:center;margin-bottom:4px}
.login-box .sub{text-align:center;font-size:12px;color:#94a3b8;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:#1e2433}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;box-sizing:border-box}
.btn-login{width:100%;padding:12px;background:#4080FF;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-login:hover{background:#3570E0}
.roles{display:flex;gap:8px;margin-bottom:16px}
.role-card{flex:1;text-align:center;padding:12px 8px;border:2px solid #E8EAED;border-radius:8px;cursor:pointer;font-size:12px;transition:all .15s}
.role-card:hover{border-color:#4080FF}
.role-card.sel{border-color:#4080FF;background:#F5F8FF}
.role-card .icon{font-size:24px;display:block;margin-bottom:4px}
</style>
</head>
<body>

<div class="login-box">
  <h1>智能招聘系统</h1>
  <div class="sub">Recruitment Workbench</div>

  <label style="font-size:13px;font-weight:600;color:#1e2433">演示角色</label>
  <div class="roles">
    <div class="role-card sel" data-role="admin" onclick="selRole(this)">
      <span class="icon" style="font-size:28px">A</span>管理员<div style="font-size:10px;color:#94a3b8;margin-top:2px">全部功能+系统配置</div>
    </div>
    <div class="role-card" data-role="hr" onclick="selRole(this)">
      <span class="icon" style="font-size:28px">HR</span>HR 专员<div style="font-size:10px;color:#94a3b8;margin-top:2px">招聘全流程操作</div>
    </div>
    <div class="role-card" data-role="interviewer" onclick="selRole(this)">
      <span class="icon" style="font-size:28px">I</span>面试官<div style="font-size:10px;color:#94a3b8;margin-top:2px">仅面试评价与查看</div>
    </div>
  </div>

  <div class="form-group"><label>账号</label><input type="text" id="username" value="admin" placeholder="输入账号"></div>
  <div class="form-group"><label>密码</label><input type="password" id="password" value="123456" placeholder="输入密码"></div>
  <button class="btn-login" onclick="login()">登 录</button>
  <div style="text-align:center;margin-top:12px;font-size:11px;color:#94a3b8">原型演示 · 点登录即可进入</div>
</div>

<script>
let selectedRole = 'admin';
function selRole(el){ document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('sel')); el.classList.add('sel'); selectedRole = el.dataset.role; }
function login(){
  localStorage.setItem('hr_role', selectedRole);
  localStorage.setItem('hr_user', document.getElementById('username').value);
  location.href = 'recruit-dashboard.html';
}
</script>
</body>
</html>
